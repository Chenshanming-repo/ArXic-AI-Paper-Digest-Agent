name: Daily ArXiv Digest

on:
  schedule:
    # 09:00 UTC every day
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python main.py

      - name: Commit and push digest
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add digest/digest.md digest/latest.md

          if git diff --staged --quiet; then
            echo "No digest changes to commit."
            exit 0
          fi

          paper_count=$(grep -c '^### ' digest/latest.md || echo 0)
          today=$(date -u +%Y-%m-%d)

          git commit -m "digest: ${today} (${paper_count} papers)"
          git push
