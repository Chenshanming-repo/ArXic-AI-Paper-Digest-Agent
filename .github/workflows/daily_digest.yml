name: Daily ArXiv Digest

on:
  schedule:
    # 09:00 UTC every day
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run digest
        env:
          API_KEY: ${{ secrets.API_KEY }}
          BASE_URL: ${{ secrets.BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS || vars.EMAIL_RECIPIENTS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS || vars.SMTP_USE_TLS }}
          SMTP_USE_SSL: ${{ secrets.SMTP_USE_SSL || vars.SMTP_USE_SSL }}
          EMAIL_SEND_DAILY: ${{ vars.EMAIL_SEND_DAILY }}
          EMAIL_SEND_WEEKLY: ${{ vars.EMAIL_SEND_WEEKLY }}
          EMAIL_SEND_MONTHLY: ${{ vars.EMAIL_SEND_MONTHLY }}
        run: python main.py

      - name: Commit and push digest
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # Stage the whole digest directory so the step is a no-op when
          # main.py exits cleanly without writing (e.g. no papers in the
          # lookback window, or all summaries failed).
          git add digest/

          if git diff --staged --quiet; then
            echo "No digest changes to commit (no new papers, or content unchanged)."
            exit 0
          fi

          paper_count=$(grep -c '^### ' digest/latest.md || echo 0)
          today=$(date -u +%Y-%m-%d)

          git commit -m "digest: ${today} (${paper_count} papers)"
          git push
